baseURL = "https://shiyuanjie.cn"
languageCode = "zh-CN"
title = "Yuanjie-跑步爱好者，IT从业者。"
theme = "PaperMod"
# googleAnalytics = "G-5XEH1YLC7R"  # UA-XXXXXXXX-X

## 保持分类的原始名字（false会做转小写处理）
preserveTaxonomyNames = true
## 是否禁止URL Path转小写
disablePathToLower = true

hasCJKLanguage = true
summaryLength = 140
ignoreLogs = ['warning-goldmark-raw-html']


## 站内搜索需要首页额外输出 JSON 索引（PaperMod 内置 Fuse.js 搜索）
[outputs]
  home = ["HTML", "RSS", "JSON"]

[author]
  name = "Yuanjie"

[params]
  author = "Yuanjie"
  description = "跑步爱好者，IT从业者。"
  keywords = ["测试","敏捷","跑步","项目管理","学习"]
  defaultTheme = "auto" # light, dark, auto
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  env = "production" # enables GA/Utterances/Disqus etc.
  busuanzi = false # 已改用 Cloudflare Web Analytics（后台仪表盘，无页面可见计数器）；如需恢复页面可见 PV/UV 计数，改回 true
  # Cloudflare Web Analytics：在 Cloudflare 仪表盘 → Web Analytics 添加站点后，把 beacon token 填到这里即可生效
  cloudflareWebAnalyticsToken = ""
  baiduAd = "ac69e1e54b317232c0d3a881b738cfe8"
  beian = "陕ICP备20003547号-1"
  homeInfoParams = { Title = "你好，我是 Yuanjie", Content = "跑步爱好者 · IT从业者 · 记录与分享" }
  socialIcons = [
    { name = "github", url = "https://github.com/aimer1124" },
  ]
  # 可在 layouts/partials/extend_head.html 中引入 busuanzi 与自定义统计脚本
  # 如果需要自定义 CSS/JS:
  # assets/css/extended/ 或 assets/js/extended/

  # 友情链接 (PaperMod 无内置 links 区域, 可在自定义 widget 或页面里用数据文件; 暂保留原结构供后续迁移)

